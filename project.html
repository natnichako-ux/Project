<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMap UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- หน้า UI -->
    <section id="ui-screen" class="screen active">
        <div class="card">
            <h1>🌍 WebMap</h1>
            <p>เข้าสู่ระบบแผนที่แบบอินเตอร์แอคทีฟ</p>
            <button id="goto-map" class="primary-btn">
                🚀 ไปที่แผนที่
            </button>
        </div>
    </section>

    <!-- หน้า Map -->
    <section id="map-screen" class="screen">
        <div class="map-header">
            <h2>📍 แผนที่</h2>
            <button id="back-button" class="secondary-btn">← กลับ</button>
        </div>

        <iframe id="map-frame" src="map-screen.html"></iframe>
    </section>

</div>

<script src="project.js"></script>
</body>
</html>

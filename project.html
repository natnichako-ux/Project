<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMap UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- container หลักสำหรับหน้า UI และหน้า map -->
    <div class="container">
        <!-- หน้าจอ UI เริ่มต้น -->
        <section id="ui-screen" class="screen active">
            <h1>ยินดีต้อนรับสู่ WebMap</h1>
            <p>กดปุ่มด้านล่างเพื่อไปยังหน้าแผนที่ โดยยังอยู่ที่ URL เดิม</p>
            <button id="goto-map">GoToMap</button>
        </section>

        <!-- หน้าจอแผนที่แยกเป็นไฟล์ map-screen.html -->
        <section id="map-screen" class="screen">
            <div class="toolbar">
                <button id="back-button">กลับหน้า UI</button>
            </div>
            <iframe id="map-frame" src="" title="WebMap"></iframe>
        </section>
    </div>

    <!-- โหลดสคริปต์ JavaScript สำหรับการสลับหน้า -->
    <script src="project.js"></script>
</body>
</html>
